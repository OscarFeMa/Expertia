name: CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt pytest ruff 2>&1
      - name: Test basic import
        run: python -c "from config.settings import DATABASE_PATH; print(f'config OK, DB={DATABASE_PATH}')" 2>&1
      - name: Full import test
        run: python tests/test_orchestrator_imports.py 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output
          path: /tmp/ci-test-output.txt
          retention-days: 1
