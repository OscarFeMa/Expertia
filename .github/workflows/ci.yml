name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint
        run: ruff check . --ignore=E501,E402,F403,F405,F811 2>&1 || true
      - name: Test imports
        run: python tests/test_orchestrator_imports.py
      - name: Run unit tests
        run: python -m pytest tests/ -v --ignore=tests/test_web_scraper.py --ignore=tests/test_dissect_wikidata_deep.py --ignore=tests/test_dissect_wikidata_imports.py --ignore=tests/test_orchestrator_phase_b.py
